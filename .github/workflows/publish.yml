name: Publish to npm

# Publishes the version currently in package.json when a GitHub Release is
# published. Bump the version, tag vX.Y.Z, push, then create the Release.
# (No build step: the published files are plain .mjs, so no install is needed.)
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Publish
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
